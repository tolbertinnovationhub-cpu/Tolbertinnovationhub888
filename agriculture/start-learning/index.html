<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Start Learning | Agriculture Fundamentals</title><link rel="stylesheet" href="../../../styles.css" /></head><body><a class="skip-link" href="#main-content">Skip to main content</a><header class="site-header"><div class="container nav-wrap"><a class="brand" href="../../../index.html">Tolbert Innovation Hub</a><nav class="nav-links" aria-label="Main navigation"><a href="../../../index.html">Home</a><a class="active" aria-current="page" href="../../../learning/">Learning Hub</a><a href="../../../materials/">Materials</a><a href="../../../contact.html">Contact</a></nav></div></header><main id="main-content" class="section"><div class="container"><p class="section-label">Learning Flow</p><h1 class="page-title">Agriculture Fundamentals - Start Learning</h1><div class="learning-flow-wrap"><aside class="card learning-flow-nav"><h2>Course Content</h2><div id="course-content-nav"></div><section class="learning-score-history"><div class="learning-score-row"><h3>Quiz Scores</h3><button type="button" class="btn btn-outline btn-compact" id="clear-score-history-btn">Clear Quiz History</button></div><div id="score-history"></div></section></aside><section class="card learning-flow-content"><p class="section-label">Course Progress</p><p id="progress-text" class="form-note"></p><div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="progress-fill" class="progress-fill"></div></div><div id="lesson-content-area"></div></section></div></div></main><footer class="site-footer"><p class="copyright-note">© 2026 Tolbert Innovation Hub. All rights reserved.</p></footer><script>const modules=[{id:'module-1',title:'Agriculture Fundamentals',noteUrl:'../../../materials/agriculture-soil-crop-checklist.txt',quizLabel:'Final Quiz',lessons:[{title:'Lesson 1: Farm Planning and Setup',video:'https://www.youtube.com/embed/9No-FiEInLA',note:'Plan land use, crop goals, and seasonal work schedules for reliable production.',practiceUrl:'../../../materials/agriculture-farm-planning-template.csv'},{title:'Lesson 2: Soil and Water Management',video:'https://www.youtube.com/embed/fvZrYxQ1W88',note:'Improve yield with soil checks, irrigation planning, and nutrient balance.',practiceUrl:'../../../materials/agriculture-soil-crop-checklist.txt'},{title:'Lesson 3: Crop Production Cycles',video:'https://www.youtube.com/embed/nU-IIXBWlS4',note:'Manage planting, monitoring, and pest control across each crop cycle.',practiceUrl:'../../../materials/agriculture-farm-planning-template.csv'},{title:'Lesson 4: Harvest and Market Strategy',video:'https://www.youtube.com/embed/4aMWf06L9nQ',note:'Prepare harvest timing, storage plans, and route-to-market decisions.',practiceUrl:'../../../materials/agriculture-soil-crop-checklist.txt'}],quizQuestions:[{question:'Strong farm planning starts with?',options:['Clear seasonal plan','Random planting'],correctIndex:0},{question:'Soil health affects?',options:['Crop productivity','Nothing'],correctIndex:0},{question:'Pest monitoring should be?',options:['Regular and recorded','Ignored'],correctIndex:0},{question:'Market strategy helps with?',options:['Better pricing and sales timing','Late spoilage'],correctIndex:0},{question:'Best habit for small farms?',options:['Track inputs and outputs','Avoid records'],correctIndex:0}]}];const storageKey='agricultureLearningFlow';const steps=[];modules.forEach(m=>{m.lessons.forEach((l,i)=>steps.push({id:`${m.id}-lesson-${i+1}`,type:'lesson',title:l.title,video:l.video,note:l.note,noteUrl:m.noteUrl,practiceUrl:l.practiceUrl}));steps.push({id:`${m.id}-quiz`,type:'quiz',title:m.quizLabel,questions:m.quizQuestions,noteUrl:m.noteUrl});});const d=()=>({completed:[],unlockedIndex:0,currentIndex:0,quizResults:{},quizAttempts:{}});let state=(()=>{try{const r=localStorage.getItem(storageKey);return r?{...d(),...JSON.parse(r)}:d()}catch{return d()}})();const save=()=>localStorage.setItem(storageKey,JSON.stringify(state));const done=id=>state.completed.includes(id);const mark=id=>{if(!done(id))state.completed.push(id)};const go=i=>{if(i<0||i>=steps.length||i>state.unlockedIndex)return;state.currentIndex=i;save();render()};const next=()=>{mark(steps[state.currentIndex].id);state.unlockedIndex=Math.min(Math.max(state.unlockedIndex,state.currentIndex+1),steps.length-1);state.currentIndex=Math.min(state.currentIndex+1,steps.length-1);save();render()};const prev=()=>{state.currentIndex=Math.max(state.currentIndex-1,0);save();render()};const attempts=id=>Array.isArray(state.quizAttempts?.[id])?state.quizAttempts[id]:[];const addAttempt=(id,score)=>{if(!state.quizAttempts)state.quizAttempts={};if(!Array.isArray(state.quizAttempts[id]))state.quizAttempts[id]=[];state.quizAttempts[id].push({score,timestamp:new Date().toISOString()});};function renderProgress(){const p=Math.round((state.completed.length/steps.length)*100),f=Math.round((p/100)*5);document.getElementById('progress-text').textContent=`${'⬛'.repeat(f)}${'⬜'.repeat(5-f)} ${p}% Complete`;document.getElementById('progress-fill').style.width=`${p}%`;document.querySelector('.progress-track')?.setAttribute('aria-valuenow',String(p));}function renderNav(){let h='<h3>Agriculture Fundamentals</h3><ul class="list-tight learning-nav-list">';modules[0].lessons.forEach((l,i)=>{const id=`module-1-lesson-${i+1}`,si=steps.findIndex(s=>s.id===id),lk=si>state.unlockedIndex;h+=`<li><button type="button" class="learning-nav-item ${lk?'is-locked':''} ${si===state.currentIndex?'is-active':''}" data-step-index="${si}" ${lk?'disabled':''}>${l.title} ${done(id)?'✓':''}</button></li>`});const q='module-1-quiz',qi=steps.findIndex(s=>s.id===q),sc=state.quizResults[q];h+=`<li><button type="button" class="learning-nav-item ${qi>state.unlockedIndex?'is-locked':''} ${qi===state.currentIndex?'is-active':''}" data-step-index="${qi}" ${qi>state.unlockedIndex?'disabled':''}>Final Quiz${typeof sc==='number'?` (${sc}%)`:''} ${done(q)?'✓':''}</button></li></ul>`;const c=document.getElementById('course-content-nav');c.innerHTML=h;c.querySelectorAll('.learning-nav-item').forEach(b=>b.addEventListener('click',()=>go(Number(b.dataset.stepIndex))));}function renderScore(){const a=attempts('module-1-quiz').slice().reverse();document.getElementById('score-history').innerHTML=`<ul class="list-tight">${a.length?a.map((x,i)=>`<li>Attempt ${a.length-i}: ${x.score}% <span class="form-note">(${new Date(x.timestamp).toLocaleString()})</span></li>`).join(''):'<li>Final Quiz: Not attempted</li>'}</ul>`;document.getElementById('clear-score-history-btn')?.addEventListener('click',()=>{if(!window.confirm('Clear all saved quiz scores and attempt history?'))return;state.quizResults={};state.quizAttempts={};save();render();});}function renderContent(){const s=steps[state.currentIndex],a=document.getElementById('lesson-content-area'),last=state.currentIndex===steps.length-1,fin=s.type==='lesson'&&s.id==='module-1-lesson-4';if(s.type==='lesson'){const preview=fin&&!done('module-1-quiz')?`<section class="card learning-block"><h3>🎓 Course Completed</h3><p>Next steps:</p><ul class="list-tight"><li>✔ Take Final Quiz</li><li>✔ Request Certificate</li><li>✔ Download Certificate</li></ul><div class="hero-actions"><button type="button" class="btn btn-primary" id="go-final-quiz-btn">Take Final Quiz</button></div></section>`:'';a.innerHTML=`<h2>${s.title}</h2><section class="learning-video-wrap"><iframe src="${s.video}" title="${s.title}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen loading="lazy"></iframe></section><section class="card learning-block"><h3>Lesson Notes</h3><p>${s.note}</p></section><section class="card learning-block"><h3>Example / Practice</h3><p>Complete the linked practice material for this lesson.</p></section><div class="hero-actions"><button type="button" class="btn btn-outline" id="prev-btn" ${state.currentIndex===0?'disabled':''}>⬅ Previous Lesson</button><button type="button" class="btn btn-primary" id="next-btn">➡ Next Lesson</button><a class="btn btn-secondary" href="${s.noteUrl}" target="_blank" rel="noopener noreferrer">Download Lesson Notes</a><a class="btn btn-secondary" href="${s.practiceUrl}" target="_blank" rel="noopener noreferrer">Practice Exercise</a><button type="button" class="btn btn-outline" id="quiz-jump-btn">Take Quiz</button></div>${preview}`;document.getElementById('prev-btn')?.addEventListener('click',prev);document.getElementById('next-btn')?.addEventListener('click',next);document.getElementById('quiz-jump-btn')?.addEventListener('click',()=>go(steps.findIndex(x=>x.id==='module-1-quiz')));document.getElementById('go-final-quiz-btn')?.addEventListener('click',()=>go(steps.findIndex(x=>x.id==='module-1-quiz')));return;}const pass=60,ps=state.quizResults[s.id],qs=s.questions.map((q,i)=>`<div class="learning-block"><p><strong>${i+1}. ${q.question}</strong></p>${q.options.map((o,idx)=>`<label><input type="radio" name="q${i+1}" value="${idx}" required /> ${o}</label>`).join('')}</div>`).join(''),doneMsg=last&&done(s.id)?`<section class="card learning-block"><h3>🎓 Course Completed</h3><p>Next steps:</p><ul class="list-tight"><li>✔ Take Final Quiz</li><li>✔ Request Certificate</li><li>✔ Download Certificate</li></ul><div class="hero-actions"><a class="btn btn-secondary" href="../../../certificate-request.html">Request Certificate - $5</a><a class="btn btn-primary" href="../../../materials/agriculture-fundamentals-certificate-template.txt" download>Download Certificate</a></div></section>`:'';a.innerHTML=`<h2>${s.title}</h2><form class="card form-card learning-block" id="flow-quiz-form"><h3>Quiz Questions</h3>${qs}<div class="hero-actions"><button type="submit" class="btn btn-primary">Submit Final Quiz</button><button type="button" class="btn btn-outline" id="retake-quiz-btn">Retake Quiz</button></div><p class="form-feedback" id="quiz-feedback" aria-live="polite">${typeof ps==='number'?`Last score: ${ps}%`:''}</p></form><div class="hero-actions"><button type="button" class="btn btn-outline" id="prev-btn">⬅ Previous Lesson</button><a class="btn btn-secondary" href="${s.noteUrl}" target="_blank" rel="noopener noreferrer">Download Lesson Notes</a><button type="button" class="btn btn-outline" id="next-btn" disabled>➡ Next Lesson</button></div>${doneMsg}`;document.getElementById('prev-btn')?.addEventListener('click',prev);document.getElementById('flow-quiz-form')?.addEventListener('submit',e=>{e.preventDefault();const fb=document.getElementById('quiz-feedback'),fd=new FormData(e.currentTarget);let c=0;s.questions.forEach((q,i)=>{if(Number(fd.get(`q${i+1}`))===q.correctIndex)c+=1});const score=Math.round((c/s.questions.length)*100);state.quizResults[s.id]=score;addAttempt(s.id,score);if(score>=pass){mark(s.id);state.unlockedIndex=Math.min(Math.max(state.unlockedIndex,state.currentIndex+1),steps.length-1);fb.textContent=`Passed: ${score}% (minimum ${pass}%).`;fb.style.color='#0b5a32';}else{fb.textContent=`Score: ${score}%. You need at least ${pass}% to complete this course.`;fb.style.color='#b42318';}save();render();});document.getElementById('retake-quiz-btn')?.addEventListener('click',()=>{document.getElementById('flow-quiz-form')?.reset();const fb=document.getElementById('quiz-feedback');if(fb){fb.textContent='Quiz reset. You can submit a new attempt.';fb.style.color='#1b3d6b';}});}function render(){renderProgress();renderNav();renderScore();renderContent();}render();</script><script src="../../../main.js"></script></body></html>
